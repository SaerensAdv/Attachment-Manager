        googleAdsCustomerId:
          type: ["string", "null"]
        googleAdsLive:
          type: ["string", "null"]
        googleAdsLiveAt:
          type: ["string", "null"]
          format: date-time
        competitorAdvertisers:
          type: ["string", "null"]
        competitorAdsLive:
          type: ["string", "null"]
        competitorAdsLiveAt:
          type: ["string", "null"]
          format: date-time
        searchConsoleSiteUrl:
          type: ["string", "null"]
        searchConsoleLive:
          type: ["string", "null"]
