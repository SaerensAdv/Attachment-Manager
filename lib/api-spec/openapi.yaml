openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: docs
    description: Documentation system-map operations
  - name: clients
    description: Client profile management (persisted)
  - name: generations
    description: Saved AI team generations (archive/history)
  - name: proposals
    description: Doc improvement proposals from the learning loop
  - name: alerts
    description: System alerts for silent background failures
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: partner
    description: >-
      Versioned, per-project authenticated integration API for external
      consumers such as ClickUp. (Formerly the "partner API"; the /api/v1/partner
      path prefix and key naming are kept for backward compatibility.)
  - name: visuals
    description: Visual Studio — branded LinkedIn visuals (content plan + AI backgrounds)
paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /docs/graph:
    get:
      operationId: getDocGraph
      tags: [docs]
      summary: Get the documentation graph
      description: >
        Scans the documentation folders on disk at request time and returns the
        nodes (one per document), the edges (relationships derived from the
        documents themselves), and category metadata.
      responses:
        "200":
          description: The current documentation graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocGraph"
  /docs/validate:
    get:
      operationId: getDocValidation
      tags: [docs]
      summary: Validate the documentation graph
      description: >
        Runs integrity checks over the documentation at request time: broken
        backtick references, agents missing from the orchestrator routing guide,
        isolated nodes, and missing mandatory quality docs.
      responses:
        "200":
          description: The validation report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationReport"
  /docs/content:
    get:
      operationId: getDocContent
      tags: [docs]
      summary: Get the raw markdown content of a document
      description: Returns the raw markdown for a single known document, identified by its path.
      parameters:
        - name: path
          in: query
          required: true
          description: The document path relative to the documentation root (e.g. agents/orchestrator.md).
          schema:
            type: string
      responses:
        "200":
          description: The document content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocContent"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateDocContent
      tags: [docs]
      summary: Save edited markdown for a document
      description: >
        Overwrites the raw markdown of an existing on-disk document. Synthetic
        DB-backed client docs and any path outside the documentation root are
        rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocContentUpdate"
      responses:
        "200":
          description: The updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocContent"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The document is not editable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /docs/backlinks:
    get:
      operationId: getDocBacklinks
      tags: [docs]
      summary: Documents that reference a document
      description: >
        Returns every document that references the given document — through an
        explicit backtick path reference or by naming its exact title in prose —
        together with the lines where each mention occurs.
      parameters:
        - name: path
          in: query
          required: true
          description: The target document path relative to the docs root.
          schema:
            type: string
      responses:
        "200":
          description: The documents referencing the target
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacklinkList"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /docs/search:
    post:
      operationId: searchDocs
      tags: [docs]
      summary: Semantic search across the documentation
      description: >
        Ranks documents by semantic similarity to a natural-language query using
        local multilingual sentence embeddings (no external API or key). Returns
        an ordered list of document paths with similarity scores; an empty list
        is returned when the semantic index is unavailable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocSearchInput"
      responses:
        "200":
          description: Ranked search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocSearchResults"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /team:
    get:
      operationId: getTeam
      tags: [team]
      summary: List the full team roster with personas and portraits
      description: >
        Returns one entry per agent in the agents/ folder, parsed from each
        agent's "Character & personality" persona section, together with the
        portrait URL (when a portrait exists in object storage) and any
        generated style-example portraits.
      responses:
        "200":
          description: The team roster
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamRoster"
  /team/stats:
    get:
      operationId: getTeamStats
      tags: [team]
      summary: Team-wide aggregate KPIs and per-agent leaderboard
      responses:
        "200":
          description: Aggregate team KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamStats"
  /generate/autonomous:
    post:
      operationId: triggerAutonomousGeneration
      tags: [generate]
      summary: Trigger a non-watched (autonomous) generation run
      description: >
        Runs the team server-side to completion and archives the result with
        triggerSource="autonomous". Gated behind the x-trigger-secret header
        (matched against AUTONOMOUS_TRIGGER_SECRET); returns 503 when that env
        var is unset. Intended for n8n flows or schedulers.
      parameters:
        - name: x-trigger-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutonomousGenerateRequest"
      responses:
        "200":
          description: The archived run outcome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutonomousGenerateResult"
  /team/{slug}/stats:
    get:
      operationId: getAgentStats
      tags: [team]
      summary: Aggregate KPIs for a single agent
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The agent's KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStats"
  /team/{slug}/runs:
    get:
      operationId: getAgentRuns
      tags: [team]
      summary: Recent runs this agent took part in (lead or member)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The agent's recent runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunList"
  /team/{slug}/persona:
    put:
      operationId: updateAgentPersona
      tags: [team]
      summary: Save edited persona text back to the agent's markdown
      description: >
        Surgically rewrites the agent's "Character & personality" bullets (name,
        one-liner, personality, communication style, what they care about,
        signature habit, cultural fit note) and the first paragraph of the Role
        section, persisting to agents/<slug>.md. Empty persona fields remove
        their bullet; an empty role paragraph is left untouched. Returns the
        updated team member.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePersonaRequest"
      responses:
        "200":
          description: The updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "404":
          description: No agent exists for the given slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /team/{slug}/portrait:
    post:
      operationId: uploadAgentPortrait
      tags: [team]
      summary: Upload a portrait image for an agent
      description: >
        Accepts a raw image (PNG, JPEG or WebP), normalizes it to a PNG capped at
        a sane width, and stores it at portraits/<slug>.png in object storage so
        the avatar appears immediately across the roster, profile and map.
        Returns the updated team member with versioned portrait URLs.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadPortraitRequest"
      responses:
        "200":
          description: The updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "400":
          description: The uploaded body is not a usable image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No agent exists for the given slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client-groups:
    get:
      operationId: getClientGroups
      tags: [clients]
      summary: List all client groups with member counts
      responses:
        "200":
          description: The list of client groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientGroupList"
    post:
      operationId: createClientGroup
      tags: [clients]
      summary: Create a new client group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientGroupInput"
      responses:
        "201":
          description: The created client group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientGroup"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client-groups/{id}:
    get:
      operationId: getClientGroup
      tags: [clients]
      summary: Get a single client group with its member fiches
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The client group and its members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientGroupDetail"
        "404":
          description: Client group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateClientGroup
      tags: [clients]
      summary: Update an existing client group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientGroupInput"
      responses:
        "200":
          description: The updated client group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientGroup"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteClientGroup
      tags: [clients]
      summary: Delete a client group (members become ungrouped)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "404":
          description: Client group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients:
    get:
      operationId: getClients
      tags: [clients]
      summary: List all persisted clients
      responses:
        "200":
          description: The list of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientList"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: The created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a single client by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update an existing client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "200":
          description: The updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/website-intake:
    post:
      operationId: clientWebsiteIntake
      tags: [clients]
      summary: Read the client's website and store the extracted text
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The updated client with fresh website intake
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request (e.g. no website URL set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The website could not be read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/google-ads-refresh:
    post:
      operationId: clientGoogleAdsRefresh
      tags: [clients]
      summary: Pull live Google Ads data for the client and store it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The updated client with fresh live Google Ads data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request (e.g. no customer id, missing config)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Google Ads could not be read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/search-console-refresh:
    post:
      operationId: clientSearchConsoleRefresh
      tags: [clients]
      summary: Pull live Search Console data for the client and store it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The updated client with fresh live Search Console data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request (e.g. no property, missing config)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Search Console could not be read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/bing-refresh:
    post:
      operationId: clientBingRefresh
      tags: [clients]
      summary: Pull live Bing Webmaster data for the client and store it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The updated client with fresh live Bing Webmaster data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request (e.g. no site, missing config)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Bing Webmaster could not be read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/ga4-refresh:
    post:
      operationId: clientGa4Refresh
      tags: [clients]
      summary: Pull live GA4 analytics for the client and store it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The updated client with fresh live GA4 data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request (e.g. no property id, missing config)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: GA4 could not be read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/places-refresh:
    post:
      operationId: clientPlacesRefresh
      tags: [clients]
      summary: Pull live Google Maps / Places reputation for the client and store it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The updated client with fresh live Places data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request (e.g. no query, missing config)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Google Maps could not be read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/pagespeed-refresh:
    post:
      operationId: clientPagespeedRefresh
      tags: [clients]
      summary: Pull live PageSpeed Insights for the client's landing pages and store it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The updated client with fresh live PageSpeed data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request (e.g. no URLs, missing config)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: PageSpeed Insights could not be read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/crawl-upload:
    post:
      operationId: clientCrawlUpload
      tags: [clients]
      summary: Upload a Screaming Frog crawl export (CSV) for the client and store it
      parameters:
        - name: id
          in: path
          required: true
