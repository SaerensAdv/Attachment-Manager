      operationId: clientCompetitorAdsRefresh
      tags: [clients]
      summary: Pull live competitor ads (Ads Transparency Center) and store them
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The updated client with fresh competitor-ad data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request (e.g. no competitors set, missing config)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Competitor ads could not be read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/coverage:
    get:
      operationId: getClientsCoverage
      tags: [clients]
      summary: Per-client integration coverage (which keys set + last live)
      responses:
        "200":
          description: Coverage overview for all clients
          content:
            application/json:
              schema:
