          type: ["string", "null"]
        approvalNote:
          type: ["string", "null"]
        approvalAt:
          type: ["string", "null"]
          format: date-time
        hasPendingDelivery:
          type: boolean
        pendingDeliveryKind:
          type: ["string", "null"]
          enum: ["monthly-report", "email-reply", null]
          description: >-
            Which kind of drafted-but-unsent delivery is held on this run, or
            null when none is pending.
        pendingEmailReply:
          type: ["object", "null"]
          description: >-
            For a held inbound email reply (drafted autonomously, no live
            session), the reviewable content so a human can approve from the
            archive. Identity/threading internals are intentionally omitted.
          required:
            - recipient
            - subject
            - inboundText
            - replyBody
          properties:
            recipient:
              type: string
            subject:
              type: string
            inboundText:
              type: string
            replyBody:
              type: string
        clientFacing:
          type: ["boolean", "null"]
          description: >-
            The effective quality-gate flag this run resolved to (whether the
            output was client-facing text, which decides if the Humanizer ran).
            Internal audit signal. Null on runs that failed before the gate
            resolved.
        touchesLiveAccount:
          type: ["boolean", "null"]
          description: >-
            Whether this run's work touched live spend, bids or tracking, as
            resolved for the quality gate. Internal audit signal. Null on runs
            that failed before the gate resolved.
        fanoutCandidates:
          type: ["object", "null"]
          description: >-
            For a fan-out lead step, every usable creative variation that was
            generated plus the selector's rationale, with the winning variant
            flagged. Lets the archive show the alternatives, not just the
            auto-chosen winner. Null for runs that did not fan out.
          required:
            - rationale
            - candidates
          properties:
            rationale:
              type: string
            candidates:
              type: array
              items:
                type: object
                required:
                  - variant
                  - text
                  - status
                  - winner
                properties:
                  variant:
                    type: integer
                  text:
                    type: string
                  status:
                    type: string
                  winner:
                    type: boolean
                  reason:
                    type: string
                    description: >-
                      Brief reason this variation lost (e.g. "weaker hook").
                      Empty for the winner and when no per-variant reason was
                      captured.
