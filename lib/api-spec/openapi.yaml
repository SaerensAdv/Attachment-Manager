                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/crawl-snapshots:
    get:
      operationId: getClientCrawlSnapshots
      tags: [clients]
      summary: List a client's crawl snapshots (history) for month-over-month comparison
      parameters:
