openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: docs
    description: Documentation system-map operations
  - name: clients
    description: Client profile management (persisted)
  - name: generations
    description: Saved AI team generations (archive/history)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /docs/graph:
    get:
      operationId: getDocGraph
      tags: [docs]
      summary: Get the documentation graph
      description: >
        Scans the documentation folders on disk at request time and returns the
        nodes (one per document), the edges (relationships derived from the
        documents themselves), and category metadata.
      responses:
        "200":
          description: The current documentation graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocGraph"
  /docs/content:
    get:
      operationId: getDocContent
      tags: [docs]
      summary: Get the raw markdown content of a document
      description: Returns the raw markdown for a single known document, identified by its path.
      parameters:
        - name: path
          in: query
          required: true
          description: The document path relative to the documentation root (e.g. agents/orchestrator.md).
          schema:
            type: string
      responses:
        "200":
          description: The document content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocContent"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients:
    get:
      operationId: getClients
      tags: [clients]
      summary: List all persisted clients
      responses:
        "200":
          description: The list of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientList"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: The created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a single client by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update an existing client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "200":
          description: The updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /generations:
    get:
      operationId: getGenerations
      tags: [generations]
      summary: List all saved generations (newest first)
      responses:
        "200":
          description: The archive of generations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationList"
  /generations/{id}:
    get:
      operationId: getGeneration
      tags: [generations]
      summary: Get a single generation with its full markdown body
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The generation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Generation"
        "404":
          description: Generation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteGeneration
      tags: [generations]
      summary: Delete a generation from the archive
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Generation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DocNode:
      type: object
      required: [id, path, title, category, summary]
      properties:
        id:
          type: string
          description: Stable identifier, equal to the path relative to the docs root.
        path:
          type: string
          description: Path relative to the docs root (e.g. knowledge/tone-of-voice.md).
        title:
          type: string
          description: The document's first heading, or the filename if none.
        category:
          type: string
          description: One of core, agent, client, workflow, template, knowledge.
        summary:
          type: ["string", "null"]
          description: First paragraph of the document, if any.
    DocEdge:
      type: object
      required: [source, target, kind]
      properties:
        source:
          type: string
          description: The id of the document the relationship starts from.
        target:
          type: string
          description: The id of the document the relationship points to.
        kind:
          type: string
          description: >-
            The relationship type, derived from document content: "routing"
            (orchestrator routing-guide entry to a specialist), "flow" (a
            five-layer-model transition between adjacent layers), "reference"
            (an explicit backtick/link citation), or "mention" (an incidental
            title match).
    DocCategory:
      type: object
      required: [id, label, count]
      properties:
        id:
          type: string
        label:
          type: string
        count:
          type: integer
    DocGraph:
      type: object
      required: [nodes, edges, categories]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/DocNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DocEdge"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/DocCategory"
    DocContent:
      type: object
      required: [id, path, title, category, content]
      properties:
        id:
          type: string
        path:
          type: string
        title:
          type: string
        category:
          type: string
        content:
          type: string
          description: The raw markdown content of the document.
    Client:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        business:
          type: ["string", "null"]
        world:
          type: ["string", "null"]
        services:
          type: ["string", "null"]
        audience:
          type: ["string", "null"]
        locations:
          type: ["string", "null"]
        languages:
          type: ["string", "null"]
        mainGoal:
          type: ["string", "null"]
        conversionAction:
          type: ["string", "null"]
        kpis:
          type: ["string", "null"]
        budget:
          type: ["string", "null"]
        toneOfVoice:
          type: ["string", "null"]
        channels:
          type: ["string", "null"]
        restrictions:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        landingPages:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ClientInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        business:
          type: ["string", "null"]
        world:
          type: ["string", "null"]
        services:
          type: ["string", "null"]
        audience:
          type: ["string", "null"]
        locations:
          type: ["string", "null"]
        languages:
          type: ["string", "null"]
        mainGoal:
          type: ["string", "null"]
        conversionAction:
          type: ["string", "null"]
        kpis:
          type: ["string", "null"]
        budget:
          type: ["string", "null"]
        toneOfVoice:
          type: ["string", "null"]
        channels:
          type: ["string", "null"]
        restrictions:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        landingPages:
          type: ["string", "null"]
    ClientList:
      type: object
      required: [clients]
      properties:
        clients:
          type: array
          items:
            $ref: "#/components/schemas/Client"
    GenerationSummary:
      type: object
      required:
        - id
        - clientName
        - workflowTitle
        - leadAgentTitle
        - teamTitles
        - requestText
        - createdAt
      properties:
        id:
          type: integer
        clientName:
          type: string
        workflowTitle:
          type: string
        leadAgentTitle:
          type: string
        teamTitles:
          type: array
          items:
            type: string
        requestText:
          type: string
        createdAt:
          type: string
          format: date-time
    Generation:
      type: object
      required:
        - id
        - clientName
        - workflowTitle
        - leadAgentTitle
        - teamTitles
        - requestText
        - createdAt
        - clientPath
        - workflowPath
        - leadAgentPath
        - teamPaths
        - finalMarkdown
      properties:
        id:
          type: integer
        clientName:
          type: string
        workflowTitle:
          type: string
        leadAgentTitle:
          type: string
        teamTitles:
          type: array
          items:
            type: string
        requestText:
          type: string
        createdAt:
          type: string
          format: date-time
        clientPath:
          type: string
        workflowPath:
          type: string
        leadAgentPath:
          type: string
        teamPaths:
          type: array
          items:
            type: string
        finalMarkdown:
          type: string
    GenerationList:
      type: object
      required: [generations]
      properties:
        generations:
          type: array
          items:
            $ref: "#/components/schemas/GenerationSummary"
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
