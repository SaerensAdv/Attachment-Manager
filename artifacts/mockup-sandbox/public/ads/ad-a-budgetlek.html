<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saerens Advertising — Budgetlek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; }
  .ad {
    width: 100vw; height: 100vh;
    background: #0A0A0B;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 7vh 7vw;
    box-sizing: border-box;
  }
  .logo img { height: 6vh; width: auto; max-width: 50vw; object-fit: contain; display: block; filter: brightness(0) invert(1); }
  .middle { display: flex; flex-direction: column; gap: 3.2vh; }
  .headline {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; font-size: 8vw; line-height: 1.08; color: #FAFAFA;
    letter-spacing: -0.02em;
  }
  .headline .hl { color: #F4A425; }
  .benefit {
    font-family: 'Outfit', sans-serif; font-weight: 400;
    font-size: 3.4vw; line-height: 1.4; color: rgba(250,250,250,0.72);
  }
  .cta {
    align-self: flex-start;
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
    font-size: 3.2vw; color: #0A0A0B; background: #F4A425;
    padding: 2.4vh 5.5vw; border-radius: 999px; margin-top: 1vh;
  }
  .footer {
    font-family: 'Outfit', sans-serif; font-size: 2vw;
    color: rgba(250,250,250,0.45); letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="ad">
    <div class="logo"><img src="/__mockup/ads/saerens-logo.webp" alt="Saerens Advertising"></div>
    <div class="middle">
      <div class="headline">Verbrand je budget in <span class="hl">Google Ads?</span></div>
      <div class="benefit">Ontdek gratis waar je geld weglekt.</div>
      <div class="cta">Vraag gratis audit aan</div>
    </div>
    <span class="footer">saerensadvertising.com</span>
  </div>
</body>
</html>
