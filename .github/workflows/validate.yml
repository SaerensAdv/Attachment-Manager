name: validate
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: attachment_manager_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/attachment_manager_test
      PORT: 3000
      BASE_PATH: /
      NODE_ENV: test
      AI_INTEGRATIONS_ANTHROPIC_BASE_URL: http://127.0.0.1:9
      AI_INTEGRATIONS_ANTHROPIC_API_KEY: ci-test-key-never-used
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Generate API contracts
        run: pnpm --filter @workspace/api-spec codegen:check
      - name: Validate brain hierarchy
        run: pnpm --filter @workspace/api-server validate:hierarchy
      - name: Typecheck workspace
        run: pnpm typecheck
      - name: Provision isolated test schema
        run: pnpm --filter @workspace/db push
      - name: Test API
        run: pnpm --filter @workspace/api-server test
      - name: Test frontend
        run: pnpm --filter @workspace/system-map test
      - name: Build API
        run: pnpm --filter @workspace/api-server build
      - name: Build frontend
        run: pnpm --filter @workspace/system-map build
