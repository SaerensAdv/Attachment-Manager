          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The client's crawl snapshots, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlSnapshotList"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/business-profile-refresh:
