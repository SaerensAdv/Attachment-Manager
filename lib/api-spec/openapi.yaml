components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DocNode:
      type: object
      required: [id, path, title, category, summary, fanout]
      properties:
        id:
          type: string
          description: Stable identifier, equal to the path relative to the docs root.
        path:
          type: string
          description: Path relative to the docs root (e.g. knowledge/tone-of-voice.md).
        title:
          type: string
          description: The document's first heading, or the filename if none.
        category:
          type: string
          description: One of core, agent, client, workflow, template, knowledge.
        summary:
          type: ["string", "null"]
          description: First paragraph of the document, if any.
        fanout:
          type: ["integer", "null"]
          description: >-
            For workflow docs: the default number of creative variations the lead
            agent fans out into (from the workflow's fanout marker), or 0 when the
            workflow does not opt into fan-out. null for every non-workflow doc.
    DocEdge:
      type: object
      required: [source, target, kind]
      properties:
        source:
          type: string
          description: The id of the document the relationship starts from.
        target:
          type: string
          description: The id of the document the relationship points to.
        kind:
          type: string
          description: >-
            The relationship type, derived from document content: "routing"
            (orchestrator routing-guide entry to a specialist), "flow" (a
            five-layer-model transition between adjacent layers), "reference"
            (an explicit backtick/link citation), or "mention" (an incidental
            title match).
    DocCategory:
      type: object
      required: [id, label, count]
      properties:
        id:
          type: string
        label:
          type: string
        count:
          type: integer
    DocGraph:
      type: object
      required: [nodes, edges, categories]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/DocNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DocEdge"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/DocCategory"
    DocContent:
      type: object
      required: [id, path, title, category, content]
      properties:
        id:
          type: string
        path:
          type: string
        title:
          type: string
        category:
          type: string
        content:
          type: string
          description: The raw markdown content of the document.
    ValidationIssue:
      type: object
      required: [severity, kind, message]
      properties:
        severity:
          type: string
          description: One of error, warning, info.
        kind:
          type: string
          description: Machine-readable issue category.
        source:
          type: string
          description: The doc id the issue originates from, if applicable.
        target:
          type: string
          description: The referenced doc id involved in the issue, if applicable.
        message:
          type: string
          description: Human-readable (Dutch) description of the issue.
    ValidationReport:
      type: object
      required: [issues, checkedAt, counts]
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/ValidationIssue"
        checkedAt:
          type: string
          description: ISO timestamp when the validation ran.
        counts:
          type: object
          required: [error, warning, info]
          properties:
            error:
              type: integer
            warning:
              type: integer
            info:
              type: integer
    DocContentUpdate:
      type: object
      required: [path, content]
      properties:
        path:
          type: string
          description: Path of the document to overwrite, relative to the docs root.
        content:
          type: string
          description: The new raw markdown content.
    DocSearchInput:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: Natural-language search query (Dutch or English).
        limit:
          type: integer
          description: Maximum number of results to return.
    DocSearchHit:
      type: object
      required: [path, score]
      properties:
        path:
          type: string
          description: The matched document path.
        score:
          type: number
          description: Cosine similarity score; higher is more relevant.
    DocSearchResults:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/DocSearchHit"
    Backlink:
      type: object
      required: [path, title, category, snippets]
      properties:
        path:
          type: string
        title:
          type: string
        category:
          type: string
        snippets:
          type: array
          description: Lines from the referencing document where the mention occurs.
          items:
            type: string
    BacklinkList:
      type: object
      required: [backlinks]
      properties:
        backlinks:
          type: array
          items:
            $ref: "#/components/schemas/Backlink"
    TeamDepartment:
      type: object
      required: [id, order, title, kind, description, ownerSlug, handsTo, receivesFrom]
      properties:
        id:
          type: string
          description: Stable department identifier from the agency org model (e.g. paid-media).
        order:
          type: integer
          description: Fixed position of the department (0 = Direction & Orchestration).
        title:
          type: string
          description: Editorial Dutch title for the department.
        kind:
          type: string
          enum: [direction, delivery, client, quality]
          description: Which kind of agency layer this department is.
        description:
          type: string
          description: Short editorial Dutch description of what this department does.
        ownerSlug:
          type: ["string", "null"]
          description: Slug of the department's owner (head), or null when none is named.
        handsTo:
          type: array
          items:
            type: string
          description: Department ids this department hands briefs / finished work to.
        receivesFrom:
          type: array
          items:
            type: string
          description: Department ids this department receives work from (inverse of handsTo).
    TeamMember:
      type: object
      required:
        - slug
        - path
        - title
        - name
        - oneLiner
        - personality
        - communicationStyle
        - caresMostAbout
        - signatureHabit
        - culturalFitNote
        - roleSummary
        - portraitUrl
        - portraitThumbUrl
        - department
        - isOwner
      properties:
        slug:
          type: string
          description: The agent filename without extension (e.g. copywriter).
        path:
          type: string
          description: The doc-graph node id for this agent (e.g. agents/copywriter.md).
        title:
          type: string
          description: The agent's role title, from the document's first heading.
        name:
          type: ["string", "null"]
          description: The persona's first name (e.g. Marie).
        oneLiner:
          type: ["string", "null"]
          description: The persona's "In a line" summary.
        personality:
          type: ["string", "null"]
        communicationStyle:
          type: ["string", "null"]
          description: The persona's "How they communicate" trait.
        caresMostAbout:
          type: ["string", "null"]
        signatureHabit:
          type: ["string", "null"]
        culturalFitNote:
          type: ["string", "null"]
        roleSummary:
          type: ["string", "null"]
          description: First paragraph of the agent's Role section, if present.
        portraitUrl:
          type: ["string", "null"]
          description: Public URL of the chosen full-size portrait, or null when none exists yet.
        portraitThumbUrl:
          type: ["string", "null"]
          description: >-
            Public URL of a small resized WebP thumbnail of the portrait for
            roster avatars and graph nodes, or null when none exists yet.
        department:
          $ref: "#/components/schemas/TeamDepartment"
          description: The single department this member belongs to (the one org model).
        isOwner:
          type: boolean
          description: True when this member is their department's owner (head).
    TeamRoster:
      type: object
      required: [employees, departments]
      properties:
        employees:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        departments:
          type: array
          items:
            $ref: "#/components/schemas/TeamDepartment"
          description: The agency departments (display + handoff topology).
    UpdatePersonaRequest:
      type: object
      description: >
        Editable persona fields. Every field is sent on each save (the editor
        form holds them all). A non-empty value upserts its "Character &
        personality" bullet; an empty string removes that bullet. An empty
        roleSummary leaves the Role paragraph untouched.
      required:
        - name
        - oneLiner
        - personality
        - communicationStyle
        - caresMostAbout
        - signatureHabit
        - culturalFitNote
        - roleSummary
      properties:
        name:
          type: string
          description: The persona's first name (e.g. Marie).
        oneLiner:
          type: string
          description: The persona's "In a line" summary.
        personality:
          type: string
        communicationStyle:
          type: string
        caresMostAbout:
          type: string
        signatureHabit:
          type: string
        culturalFitNote:
          type: string
        roleSummary:
          type: string
          description: First paragraph of the agent's Role section.
    UploadPortraitRequest:
      type: object
      required: [imageBase64]
      properties:
        imageBase64:
          type: string
          description: >
            The portrait image encoded as base64. A data-URL prefix
            (e.g. "data:image/png;base64,") is tolerated and stripped. The
            decoded bytes must be a PNG, JPEG or WebP image.
    RevenueClient:
      type: object
      required: [id, name, monthlyFeeEur]
      properties:
        id:
          type: integer
        name:
          type: string
        monthlyFeeEur:
          type: ["integer", "null"]
    RevenueGroup:
      type: object
      description: A klantgroep (kapstok) that carries its own monthly fee.
      required: [id, name, monthlyFeeEur]
      properties:
        id:
          type: integer
        name:
          type: string
        monthlyFeeEur:
          type: integer
    RevenueSummary:
      type: object
      required:
        - goalEur
        - totalMonthlyFeeEur
        - clientCount
        - withFeeCount
        - clients
        - groups
      properties:
        goalEur:
          type: number
        totalMonthlyFeeEur:
          type: number
          description: Combined client fees + group fees (whole euros).
        clientCount:
          type: integer
        withFeeCount:
          type: integer
        clients:
          type: array
          items:
            $ref: "#/components/schemas/RevenueClient"
        groups:
          type: array
          description: Fee-bearing klantgroepen only.
          items:
            $ref: "#/components/schemas/RevenueGroup"
    Client:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        groupId:
          type: ["integer", "null"]
        monthlyFee:
          type: ["integer", "null"]
        billingName:
          type: ["string", "null"]
        billingAddress:
          type: ["string", "null"]
        billingCountry:
          type: ["string", "null"]
        vatNumber:
          type: ["string", "null"]
        btwMode:
          type: ["string", "null"]
        business:
          type: ["string", "null"]
        world:
          type: ["string", "null"]
        services:
          type: ["string", "null"]
        audience:
          type: ["string", "null"]
        locations:
          type: ["string", "null"]
        languages:
          type: ["string", "null"]
        mainGoal:
          type: ["string", "null"]
        conversionAction:
          type: ["string", "null"]
        kpis:
          type: ["string", "null"]
        budget:
          type: ["string", "null"]
        toneOfVoice:
          type: ["string", "null"]
        channels:
          type: ["string", "null"]
        restrictions:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        landingPages:
          type: ["string", "null"]
