        placesLive:
          type: ["string", "null"]
        placesLiveAt:
          type: ["string", "null"]
          format: date-time
        pagespeedUrls:
          type: ["string", "null"]
        pagespeedLive:
          type: ["string", "null"]
        pagespeedLiveAt:
          type: ["string", "null"]
          format: date-time
        businessProfileLocationId:
          type: ["string", "null"]
        businessProfileLive:
          type: ["string", "null"]
        businessProfileLiveAt:
          type: ["string", "null"]
          format: date-time
        crawlLive:
          type: ["string", "null"]
        crawlLiveAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ClientInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        groupId:
          type: ["integer", "null"]
        monthlyFee:
          type: ["integer", "null"]
        billingName:
          type: ["string", "null"]
        billingAddress:
          type: ["string", "null"]
        billingCountry:
          type: ["string", "null"]
        vatNumber:
          type: ["string", "null"]
        btwMode:
          type: ["string", "null"]
        business:
          type: ["string", "null"]
        world:
          type: ["string", "null"]
        services:
          type: ["string", "null"]
        audience:
          type: ["string", "null"]
        locations:
          type: ["string", "null"]
        languages:
          type: ["string", "null"]
        mainGoal:
          type: ["string", "null"]
