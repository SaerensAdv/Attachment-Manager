name: validate
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: attachment_manager_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/attachment_manager_test
      PORT: 3000
      BASE_PATH: /
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-spec codegen:check
      - run: pnpm typecheck
      - run: pnpm --filter @workspace/api-server test
      - run: pnpm --filter @workspace/system-map test
      - run: pnpm --filter @workspace/api-server build
      - run: pnpm --filter @workspace/system-map build
