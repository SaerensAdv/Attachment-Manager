          application/json:
            schema:
              $ref: "#/components/schemas/CrawlUploadInput"
      responses:
        "200":
          description: The updated client with the stored crawl summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request (e.g. empty or unusable export)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
