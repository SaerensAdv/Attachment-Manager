      summary: List partner API keys (operator only, metadata only)
      responses:
        "200":
          description: The partner keys (never the secret or its hash)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerKeyListEnvelope"
    post:
      operationId: issuePartnerKey
      tags: [partner]
      summary: Issue a new partner API key (operator only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerKeyInput"
      responses:
        "201":
          description: The issued key, including the plaintext key shown once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedPartnerKey"
        "400":
          description: Missing name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Key store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /partner-keys/{id}:
    delete:
      operationId: revokePartnerKey
      tags: [partner]
      summary: Revoke a partner API key (operator only, idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The key was revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerKeyRevokeResult"
        "400":
          description: Invalid key id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Key not found or already revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/shopping-terms/runs:
    post:
      operationId: createShoppingRun
      tags: [shopping-negatives]
      summary: >-
        Analyse a client's Shopping search terms (read-only) and store a scored
        run for review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: The created run with its scored terms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingRunDetail"
        "400":
          description: Invalid request (e.g. no customer id, missing config)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The Shopping data could not be read or analysed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listShoppingRuns
      tags: [shopping-negatives]
      summary: List a client's past Shopping analysis runs (headers only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The client's runs, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingRunList"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /shopping-terms/runs/{runId}:
    get:
      operationId: getShoppingRun
      tags: [shopping-negatives]
      summary: Read one run with its scored terms and saved decisions
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingRunDetail"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /shopping-terms/runs/{runId}/decisions:
    post:
      operationId: saveShoppingDecisions
      tags: [shopping-negatives]
      summary: Save keep/exclude decisions for a run (also learns durable rules)
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShoppingSaveDecisionsInput"
      responses:
        "200":
          description: The saved decisions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingDecisionsResult"
        "400":
          description: Invalid request (no valid decisions)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/shopping-terms/settings:
    get:
      operationId: getShoppingSettings
      tags: [shopping-negatives]
      summary: Read the per-client "may write to Google Ads" switch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The current write switch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingSettings"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: updateShoppingSettings
      tags: [shopping-negatives]
      summary: Flip the per-client "may write to Google Ads" switch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShoppingSettingsInput"
      responses:
        "200":
          description: The updated write switch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingSettings"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/shopping-terms/apply:
    post:
      operationId: applyShoppingNegatives
      tags: [shopping-negatives]
      summary: >-
        Apply chosen exclusions to Google Ads. Default is a dry-run
        (validateOnly); a real write needs validateOnly=false AND the client
        write switch on.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShoppingApplyInput"
      responses:
        "200":
          description: Per-decision outcomes (dry-run or successful write)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingApplyResult"
        "400":
          description: Invalid request (e.g. nothing selected, no customer id)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Live writing is switched off for this client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The write to Google Ads failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingApplyResult"
components:
  securitySchemes:
    PartnerApiKey:
      type: http
      scheme: bearer
      description: >-
        Long-lived per-project partner key issued by the brain, sent as
        `Authorization: Bearer sap_...`.
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DocNode:
      type: object
      required: [id, path, title, category, summary, fanout, active]
      properties:
        id:
          type: string
          description: Stable identifier, equal to the path relative to the docs root.
        path:
          type: string
          description: Path relative to the docs root (e.g. knowledge/agency-foundations.md).
        title:
          type: string
          description: The document's first heading, or the filename if none.
        category:
          type: string
          description: One of core, agent, client, workflow, template, knowledge.
        summary:
          type: ["string", "null"]
          description: First paragraph of the document, if any.
        fanout:
          type: ["integer", "null"]
          description: >-
            For workflow docs: the default number of creative variations the lead
            agent fans out into (from the workflow's fanout marker), or 0 when the
            workflow does not opt into fan-out. null for every non-workflow doc.
        active:
          type: boolean
          description: >-
            Agent lifecycle flag. false when the doc opts out via frontmatter
            (active: false); such agents are excluded from routing and hidden in
            the picker but stay in the graph so the map can show them as paused.
            Defaults to true for every doc without a flag.
    DocEdge:
      type: object
      required: [source, target, kind]
      properties:
        source:
          type: string
          description: The id of the document the relationship starts from.
        target:
          type: string
          description: The id of the document the relationship points to.
        kind:
          type: string
          description: >-
            The relationship type, derived from document content: "routing"
            (orchestrator routing-guide entry to a specialist), "flow" (a
            five-layer-model transition between adjacent layers), "reference"
            (an explicit backtick/link citation), or "mention" (an incidental
            title match).
    DocCategory:
      type: object
      required: [id, label, count]
      properties:
        id:
          type: string
        label:
          type: string
        count:
          type: integer
    DocGraph:
      type: object
      required: [nodes, edges, categories]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/DocNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DocEdge"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/DocCategory"
    DocContent:
      type: object
      required: [id, path, title, category, content]
      properties:
        id:
          type: string
        path:
          type: string
        title:
          type: string
        category:
          type: string
        content:
          type: string
          description: The raw markdown content of the document.
    ValidationIssue:
      type: object
      required: [severity, kind, message]
      properties:
        severity:
          type: string
          description: One of error, warning, info.
        kind:
          type: string
          description: Machine-readable issue category.
        source:
          type: string
          description: The doc id the issue originates from, if applicable.
        target:
          type: string
          description: The referenced doc id involved in the issue, if applicable.
        message:
          type: string
          description: Human-readable (Dutch) description of the issue.
    ValidationReport:
      type: object
      required: [issues, checkedAt, counts]
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/ValidationIssue"
        checkedAt:
          type: string
          description: ISO timestamp when the validation ran.
        counts:
          type: object
          required: [error, warning, info]
          properties:
            error:
              type: integer
            warning:
              type: integer
            info:
              type: integer
    DocContentUpdate:
      type: object
      required: [path, content]
      properties:
        path:
          type: string
          description: Path of the document to overwrite, relative to the docs root.
        content:
          type: string
          description: The new raw markdown content.
    DocSearchInput:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: Natural-language search query (Dutch or English).
        limit:
          type: integer
          description: Maximum number of results to return.
    DocSearchHit:
      type: object
      required: [path, score]
      properties:
        path:
          type: string
          description: The matched document path.
        score:
          type: number
          description: Cosine similarity score; higher is more relevant.
    DocSearchResults:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/DocSearchHit"
    Backlink:
      type: object
      required: [path, title, category, snippets]
      properties:
        path:
          type: string
        title:
          type: string
        category:
          type: string
        snippets:
          type: array
          description: Lines from the referencing document where the mention occurs.
          items:
            type: string
    BacklinkList:
      type: object
      required: [backlinks]
      properties:
        backlinks:
          type: array
          items:
            $ref: "#/components/schemas/Backlink"
    TeamDepartment:
      type: object
      required: [id, order, title, kind, description, ownerSlug, handsTo, receivesFrom]
      properties:
        id:
          type: string
          description: Stable department identifier from the agency org model (e.g. paid-media).
        order:
          type: integer
          description: Fixed position of the department (0 = Direction & Orchestration).
        title:
          type: string
          description: Editorial Dutch title for the department.
        kind:
          type: string
          enum: [direction, delivery, client, quality]
          description: Which kind of agency layer this department is.
        description:
          type: string
          description: Short editorial Dutch description of what this department does.
        ownerSlug:
          type: ["string", "null"]
          description: Slug of the department's owner (head), or null when none is named.
        handsTo:
          type: array
          items:
            type: string
          description: Department ids this department hands briefs / finished work to.
        receivesFrom:
          type: array
          items:
            type: string
          description: Department ids this department receives work from (inverse of handsTo).
    TeamMember:
      type: object
      required:
        - slug
        - path
        - title
        - name
        - oneLiner
        - personality
        - communicationStyle
        - caresMostAbout
        - signatureHabit
        - culturalFitNote
        - roleSummary
        - portraitUrl
        - portraitThumbUrl
        - department
        - isOwner
        - active
      properties:
        slug:
          type: string
          description: The agent filename without extension (e.g. copywriter).
        path:
          type: string
          description: The doc-graph node id for this agent (e.g. agents/copywriter.md).
        title:
          type: string
          description: The agent's role title, from the document's first heading.
        name:
          type: ["string", "null"]
          description: The persona's first name (e.g. Marie).
        oneLiner:
          type: ["string", "null"]
          description: The persona's "In a line" summary.
        personality:
          type: ["string", "null"]
        communicationStyle:
          type: ["string", "null"]
          description: The persona's "How they communicate" trait.
        caresMostAbout:
          type: ["string", "null"]
        signatureHabit:
          type: ["string", "null"]
        culturalFitNote:
          type: ["string", "null"]
        roleSummary:
          type: ["string", "null"]
          description: First paragraph of the agent's Role section, if present.
        portraitUrl:
          type: ["string", "null"]
          description: Public URL of the chosen full-size portrait, or null when none exists yet.
        portraitThumbUrl:
          type: ["string", "null"]
          description: >-
            Public URL of a small resized WebP thumbnail of the portrait for
            roster avatars and graph nodes, or null when none exists yet.
        department:
          $ref: "#/components/schemas/TeamDepartment"
          description: The single department this member belongs to (the one org model).
        isOwner:
          type: boolean
          description: True when this member is their department's owner (head).
        active:
          type: boolean
          description: >-
            Agent lifecycle flag. false when the agent is paused via frontmatter
            (active: false): excluded from routing and greyed/hidden in the
            picker, but still shown on the team page. Defaults to true.
    TeamRoster:
      type: object
      required: [employees, departments]
      properties:
        employees:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        departments:
          type: array
          items:
            $ref: "#/components/schemas/TeamDepartment"
          description: The agency departments (display + handoff topology).
    UpdatePersonaRequest:
      type: object
      description: >
        Editable persona fields. Every field is sent on each save (the editor
        form holds them all). A non-empty value upserts its "Character &
        personality" bullet; an empty string removes that bullet. An empty
        roleSummary leaves the Role paragraph untouched.
      required:
        - name
        - oneLiner
        - personality
        - communicationStyle
        - caresMostAbout
        - signatureHabit
        - culturalFitNote
        - roleSummary
      properties:
        name:
          type: string
          description: The persona's first name (e.g. Marie).
        oneLiner:
          type: string
          description: The persona's "In a line" summary.
        personality:
          type: string
        communicationStyle:
          type: string
        caresMostAbout:
          type: string
        signatureHabit:
          type: string
        culturalFitNote:
          type: string
        roleSummary:
          type: string
          description: First paragraph of the agent's Role section.
    UploadPortraitRequest:
      type: object
      required: [imageBase64]
      properties:
        imageBase64:
          type: string
          description: >
            The portrait image encoded as base64. A data-URL prefix
            (e.g. "data:image/png;base64,") is tolerated and stripped. The
            decoded bytes must be a PNG, JPEG or WebP image.
    RevenueClient:
      type: object
      required: [id, name, monthlyFeeEur]
      properties:
        id:
          type: integer
        name:
          type: string
        monthlyFeeEur:
          type: ["integer", "null"]
    RevenueGroup:
      type: object
      description: A klantgroep (kapstok) that carries its own monthly fee.
      required: [id, name, monthlyFeeEur]
      properties:
        id:
          type: integer
        name:
          type: string
        monthlyFeeEur:
          type: integer
    RevenueSummary:
      type: object
      required:
        - goalEur
        - totalMonthlyFeeEur
        - clientCount
        - withFeeCount
        - clients
        - groups
      properties:
        goalEur:
          type: number
        totalMonthlyFeeEur:
          type: number
          description: Combined client fees + group fees (whole euros).
        clientCount:
          type: integer
        withFeeCount:
          type: integer
        clients:
          type: array
          items:
            $ref: "#/components/schemas/RevenueClient"
        groups:
          type: array
          description: Fee-bearing klantgroepen only.
          items:
            $ref: "#/components/schemas/RevenueGroup"
    Client:
